<!doctype html>
<html lang="en" class="h-full">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="/icon.svg" type="image/svg+xml" />
    <title>Options | Coub addons</title>
    <style>
      @media (prefers-color-scheme: dark) {
        html:not(.light) {
          background-color: #101010;
        }
      }
    </style>
    <!--
      don't forget to update the hash in the `wxt.config.ts` when modifying this script

      to calculate the hash, execute:

        btoa(String.fromCharCode(...new Uint8Array(await crypto.subtle.digest('sha-256', new TextEncoder('utf-8').encode(document.getElementById('set-theme').textContent)))))
    -->
    <script id="set-theme">
      (async () => {
        const theme = (await browser.storage.local.get('settings')).settings?.theme;

        const isDark =
          theme === 'dark' ||
          (theme === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);

        document.documentElement.classList.remove('light', 'dark', 'text-foreground');
        document.documentElement.classList.add(
          ...(isDark ? ['dark', 'text-foreground'] : ['light']),
        );
      })();
    </script>
  </head>
  <body class="h-full">
    <main id="root"></main>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
